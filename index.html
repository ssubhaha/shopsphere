<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ShopSphere — Premium products, curated for the discerning shopper. Electronics, fashion, home and beauty." />
  <meta name="theme-color" content="#6366f1" />

  <!-- Open Graph -->
  <meta property="og:title"       content="ShopSphere — Premium E-Commerce" />
  <meta property="og:description" content="Curated electronics, fashion, home and beauty." />
  <meta property="og:type"        content="website" />

  <title>ShopSphere</title>

  <!-- Google Fonts — loads when online, graceful fallback offline -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <!-- Apply saved theme + set default hash BEFORE any paint -->
  <script>
    (function () {
      /* Theme */
      var t = localStorage.getItem('shopsphere-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);

      /* Hash routing — ensure we always start at a valid route */
      if (!window.location.hash || window.location.hash === '#') {
        history.replaceState(null, '', window.location.pathname + '#/');
      }
    })();
  </script>
</head>
<body>

  <!-- Navigation -->
  <div id="navWrap"></div>

  <!-- Page content — router renders here -->
  <main id="main" style="min-height:calc(100vh - var(--nav-h))" tabindex="-1"></main>

  <!-- Footer -->
  <div id="footerWrap"></div>

  <!-- Cart Drawer + Overlay -->
  <div id="cartWrap"></div>

  <!-- Product Quick-View Modal -->
  <div id="modalWrap"></div>

  <!-- Scripts — ORDER MATTERS -->
  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/router.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/product.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
